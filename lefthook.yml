commit-msg:
  jobs:
    - name: commitlint
      run: pnpm commitlint --edit {1}

pre-commit:
  parallel: true
  jobs:
    - run: cargo fmt
      glob:
        - '**/*.rs'
      stage_fixed: true

    - run: cargo check --workspace
      glob:
        - '**/*.rs'
      stage_fixed: true

    - run: cargo clippy --workspace -- -D warnings
      glob:
        - '**/*.rs'
      stage_fixed: true

    - run: pnpm prettier --write {staged_files}
      glob:
        - '**/*.md'
        - '**/*.toml'
        - '**/*.yaml'
        - '**/*.yml'
        - '**/*.json'
        - 'panther-minor-controller.code-workspace'
      stage_fixed: true
